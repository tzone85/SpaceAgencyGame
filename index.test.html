<!--
Mission List Container Tests
These tests verify the mission list container meets acceptance criteria
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mission List Container Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .test-case { padding: 10px; margin: 10px 0; border-left: 4px solid #ddd; }
        .test-case.pass { background: #d4edda; border-left-color: #28a745; }
        .test-case.fail { background: #f8d7da; border-left-color: #dc3545; }
        .summary { padding: 15px; margin-top: 20px; background: #e7f3ff; border: 2px solid #0066cc; border-radius: 4px; }
        .summary.all-pass { background: #d4edda; border-color: #28a745; }
    </style>
</head>
<body>
    <h1>Mission List Container - Test Results</h1>
    <div id="testResults"></div>

    <script>
        const tests = [];

        function test(description, fn) {
            tests.push({ description, fn });
        }

        function renderResults() {
            const results = document.getElementById('testResults');
            let passCount = 0;
            let failCount = 0;

            tests.forEach(({ description, fn }) => {
                const div = document.createElement('div');
                try {
                    fn();
                    div.className = 'test-case pass';
                    div.textContent = '\u2713 ' + description;
                    passCount++;
                } catch (error) {
                    div.className = 'test-case fail';
                    div.textContent = '\u2717 ' + description + ' - ' + error.message;
                    failCount++;
                }
                results.appendChild(div);
            });

            const summary = document.createElement('div');
            summary.className = 'summary' + (failCount === 0 ? ' all-pass' : '');
            summary.textContent = 'Test Summary: ' + passCount + ' passed, ' + failCount + ' failed out of ' + tests.length + ' tests';
            results.appendChild(summary);
        }

        async function loadAndTest() {
            try {
                const response = await fetch('index.html');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                test('Mission list container exists in HTML', () => {
                    const container = doc.querySelector('.mission-list-container');
                    if (!container) throw new Error('Container with class "mission-list-container" not found');
                });

                test('Container is a section element', () => {
                    const container = doc.querySelector('section.mission-list-container');
                    if (!container) throw new Error('Container should be a <section> element');
                });

                test('Container has styling (background, border, padding)', () => {
                    if (!html.includes('.mission-list-container')) {
                        throw new Error('No styles found for .mission-list-container');
                    }
                });

                test('Mission list (ul) exists inside container', () => {
                    const container = doc.querySelector('.mission-list-container');
                    const list = container ? container.querySelector('.mission-list') : null;
                    if (!list || list.tagName !== 'UL') throw new Error('ul.mission-list should exist inside container');
                });

                test('Mission list has ID attribute for scripting', () => {
                    const list = doc.querySelector('.mission-list');
                    if (!list || !list.id) throw new Error('Mission list should have an id attribute');
                });

                test('Container has minimum height', () => {
                    if (!html.includes('min-height')) throw new Error('Container should have min-height property');
                });

                test('Container has a heading for clarity', () => {
                    const container = doc.querySelector('.mission-list-container');
                    const heading = container ? container.querySelector('h2') : null;
                    if (!heading) throw new Error('Container should have an h2 heading');
                });

                renderResults();
            } catch (error) {
                const div = document.createElement('div');
                div.className = 'test-case fail';
                div.textContent = 'Error loading tests: ' + error.message;
                document.getElementById('testResults').appendChild(div);
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndTest);
    </script>
</body>
</html>
