<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Dashboard Styling Tests</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f0f0f0;
        }
        .test {
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-left: 4px solid #333;
        }
        .pass {
            border-left-color: green;
            background: #e8f5e9;
        }
        .fail {
            border-left-color: red;
            background: #ffebee;
        }
    </style>
</head>
<body>
    <h1>Space Dashboard Styling Tests</h1>
    <div id="test-results"></div>

    <script>
        const tests = [];
        const results = document.getElementById('test-results');

        function test(name, fn) {
            tests.push({ name, fn });
        }

        function runTests() {
            const iframe = document.createElement('iframe');
            iframe.src = 'index.html';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);

            iframe.onload = function() {
                const doc = iframe.contentDocument;
                const win = iframe.contentWindow;

                // Test 1: Space theme colors are present
                test('Space theme dark background', () => {
                    const bodyStyle = win.getComputedStyle(doc.body);
                    const background = bodyStyle.background || bodyStyle.backgroundColor;
                    return background.includes('rgb') || background.includes('gradient');
                });

                // Test 2: Budget counter has space styling
                test('Budget counter has glowing border', () => {
                    const counter = doc.querySelector('.budget-counter');
                    const style = win.getComputedStyle(counter);
                    return style.border.includes('2px');
                });

                // Test 3: Mission list container exists
                test('Mission list container exists', () => {
                    return doc.querySelector('.mission-list-container') !== null;
                });

                // Test 4: Mission list items are styled
                test('Mission list items have proper styling', () => {
                    const list = doc.querySelector('.mission-list');
                    return list !== null && win.getComputedStyle(list).display === 'flex';
                });

                // Test 5: Heading exists and is styled
                test('Mission section heading is styled', () => {
                    const heading = doc.querySelector('.mission-list-container h2');
                    return heading !== null && heading.textContent === 'Available Missions';
                });

                // Test 6: Proper font family
                test('Monospace font (Courier New) is used', () => {
                    const bodyStyle = win.getComputedStyle(doc.body);
                    return bodyStyle.fontFamily.includes('Courier') || bodyStyle.fontFamily.includes('monospace');
                });

                // Test 7: Budget counter has hover effects
                test('Budget counter has transition effects', () => {
                    const counter = doc.querySelector('.budget-counter');
                    const style = win.getComputedStyle(counter);
                    return style.transition.includes('0.3s');
                });

                // Test 8: Mission list items have hover effects
                test('Mission list items have hover effects', () => {
                    const li = doc.createElement('style');
                    const sheet = doc.createElement('style');
                    const html = document.querySelector('style').textContent;
                    return html.includes('mission-list li:hover');
                });

                // Test 9: Button styling exists
                test('Button styling is defined', () => {
                    const html = document.querySelector('style').textContent;
                    return html.includes('button') && html.includes('padding: 12px');
                });

                // Test 10: Empty state styling exists
                test('Empty state styling for mission list', () => {
                    const list = doc.querySelector('.mission-list.empty');
                    return list !== null;
                });

                // Run all tests
                tests.forEach(t => {
                    try {
                        const passed = t.fn();
                        const div = document.createElement('div');
                        div.className = 'test ' + (passed ? 'pass' : 'fail');
                        div.textContent = (passed ? '✓ PASS' : '✗ FAIL') + ': ' + t.name;
                        results.appendChild(div);
                    } catch (e) {
                        const div = document.createElement('div');
                        div.className = 'test fail';
                        div.textContent = '✗ ERROR: ' + t.name + ' - ' + e.message;
                        results.appendChild(div);
                    }
                });

                // Count results
                const passed = results.querySelectorAll('.pass').length;
                const failed = results.querySelectorAll('.fail').length;
                const summary = document.createElement('div');
                summary.style.marginTop = '30px';
                summary.style.padding = '20px';
                summary.style.fontSize = '18px';
                summary.style.fontWeight = 'bold';
                summary.textContent = `Results: ${passed} passed, ${failed} failed`;
                results.appendChild(summary);
            };
        }

        // Wait a bit for page to load, then run tests
        setTimeout(runTests, 100);
    </script>
</body>
</html>
