<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mission Entry Creation - Integration Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .test-section { margin: 20px 0; padding: 15px; background: white; border-radius: 4px; }
        .test-case { padding: 10px; margin: 10px 0; border-left: 4px solid #ddd; }
        .test-case.pass { background: #d4edda; border-left-color: #28a745; }
        .test-case.fail { background: #f8d7da; border-left-color: #dc3545; }
        .summary { padding: 15px; margin-top: 20px; background: #e7f3ff; border: 2px solid #0066cc; border-radius: 4px; }
        .summary.all-pass { background: #d4edda; border-color: #28a745; }
        .test-container { border: 1px solid #ddd; padding: 20px; margin: 20px 0; background: white; }
    </style>
</head>
<body>
    <h1>Mission Entry Creation - Integration Tests</h1>
    <div id="testResults"></div>

    <!-- Test container with the actual application code -->
    <div id="testContainer" style="display: none;"></div>

    <script>
        const tests = [];

        function test(description, fn) {
            tests.push({ description, fn });
        }

        function renderResults() {
            const results = document.getElementById('testResults');
            let passCount = 0;
            let failCount = 0;

            tests.forEach(({ description, fn }) => {
                const div = document.createElement('div');
                try {
                    fn();
                    div.className = 'test-case pass';
                    div.textContent = '✓ ' + description;
                    passCount++;
                } catch (error) {
                    div.className = 'test-case fail';
                    div.textContent = '✗ ' + description + ' - ' + error.message;
                    failCount++;
                }
                results.appendChild(div);
            });

            const summary = document.createElement('div');
            summary.className = 'summary' + (failCount === 0 ? ' all-pass' : '');
            summary.textContent = 'Test Summary: ' + passCount + ' passed, ' + failCount + ' failed out of ' + tests.length + ' tests';
            results.appendChild(summary);
        }

        async function loadAndTest() {
            try {
                const response = await fetch('index.html');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Extract and inject the application into a test container
                const testContainer = document.getElementById('testContainer');
                const missionListContainer = doc.querySelector('.mission-list-container');
                const launchBtn = doc.getElementById('launchMissionBtn');
                const missionList = doc.getElementById('missionList');

                // Extract the script
                const scriptTag = doc.querySelector('script');
                const scriptContent = scriptTag ? scriptTag.textContent : '';

                // Create a test environment
                const testHtml = html.replace(/^[\s\S]*<body>/, '<body>').replace(/<\/body>[\s\S]*$/, '</body>');

                // Tests for behavior
                test('Launch Mission button exists and is accessible', () => {
                    if (!launchBtn) throw new Error('Launch button not found');
                    if (launchBtn.id !== 'launchMissionBtn') throw new Error('Button ID should be launchMissionBtn');
                });

                test('Mission list exists with empty class initially', () => {
                    if (!missionList) throw new Error('Mission list not found');
                    if (!missionList.classList.contains('empty')) throw new Error('Mission list should have empty class initially');
                });

                test('Initial mission list contains placeholder message', () => {
                    if (!missionList) throw new Error('Mission list not found');
                    const hasPlaceholder = Array.from(missionList.children).some(child =>
                        child.textContent.includes('No missions available')
                    );
                    if (!hasPlaceholder) throw new Error('Should have placeholder message initially');
                });

                test('Script defines missions array with planet and cost', () => {
                    if (!scriptContent.includes('const missions') || !scriptContent.includes('planet') || !scriptContent.includes('cost')) {
                        throw new Error('Missions array should be defined with planet and cost properties');
                    }
                });

                test('Script defines createMissionEntry function', () => {
                    if (!scriptContent.includes('function createMissionEntry')) {
                        throw new Error('createMissionEntry function should be defined');
                    }
                });

                test('Script defines addMission function', () => {
                    if (!scriptContent.includes('function addMission')) {
                        throw new Error('addMission function should be defined');
                    }
                });

                test('createMissionEntry creates list item element', () => {
                    if (!scriptContent.includes("document.createElement('li')") && !scriptContent.includes('createElement(\'li\')')) {
                        throw new Error('createMissionEntry should create list item elements');
                    }
                });

                test('createMissionEntry adds mission-entry class', () => {
                    if (!scriptContent.includes("'mission-entry'")) {
                        throw new Error('Mission entries should have mission-entry class');
                    }
                });

                test('Mission entry displays planet name', () => {
                    if (!scriptContent.includes('mission-entry-planet') || !scriptContent.includes('planet')) {
                        throw new Error('Mission entry should display planet name with mission-entry-planet class');
                    }
                });

                test('Mission entry displays cost', () => {
                    if (!scriptContent.includes('mission-entry-cost') || !scriptContent.includes('cost')) {
                        throw new Error('Mission entry should display cost with mission-entry-cost class');
                    }
                });

                test('Cost is formatted with toLocaleString', () => {
                    if (!scriptContent.includes('toLocaleString')) {
                        throw new Error('Cost should be formatted using toLocaleString for thousands separator');
                    }
                });

                test('addMission removes empty class on first mission', () => {
                    if (!scriptContent.includes("classList.contains('empty')")) {
                        throw new Error('addMission should check and remove empty class');
                    }
                });

                test('addMission clears HTML when removing empty message', () => {
                    if (!scriptContent.includes('innerHTML = \'\'')) {
                        throw new Error('addMission should clear empty placeholder');
                    }
                });

                test('Multiple missions can be added (cycling support)', () => {
                    if (!scriptContent.includes('missionIndex') || !scriptContent.includes('%')) {
                        throw new Error('Should support adding multiple missions with cycling');
                    }
                });

                test('Event listener registered for Launch Mission button', () => {
                    if (!scriptContent.includes('launchMissionBtn') || !scriptContent.includes('addEventListener')) {
                        throw new Error('Should register click event listener for button');
                    }
                });

                test('Event listener is registered on DOMContentLoaded', () => {
                    if (!scriptContent.includes('DOMContentLoaded')) {
                        throw new Error('Should register listener on DOMContentLoaded');
                    }
                });

                test('Styling includes mission-entry gradient background', () => {
                    if (!html.includes('.mission-entry') || !html.includes('linear-gradient')) {
                        throw new Error('Mission entries should have gradient background for visual distinction');
                    }
                });

                test('Styling includes mission-entry hover effect', () => {
                    if (!html.includes('.mission-entry:hover') || !html.includes('transform')) {
                        throw new Error('Mission entries should have hover effects for interactivity');
                    }
                });

                test('Styling includes launch button styling', () => {
                    if (!html.includes('.launch-mission-btn')) {
                        throw new Error('Launch button should have styled class');
                    }
                });

                test('Launch button has hover effect', () => {
                    if (!html.includes('.launch-mission-btn:hover') || !html.includes('transform')) {
                        throw new Error('Launch button should have hover effects');
                    }
                });

                test('Mission entries use safe DOM methods (not innerHTML for user content)', () => {
                    if (!scriptContent.includes('textContent') && !scriptContent.includes('appendChild')) {
                        throw new Error('Should use safe DOM methods like textContent or appendChild');
                    }
                });

                renderResults();
            } catch (error) {
                const div = document.createElement('div');
                div.className = 'test-case fail';
                div.textContent = '✗ Error loading tests: ' + error.message;
                document.getElementById('testResults').appendChild(div);
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndTest);
    </script>
</body>
</html>
