<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Command Academy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .budget-counter {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <main id="dashboard-container" class="dashboard">
        <div data-budget-counter class="budget-counter">
            Budget: $1,000,000
        </div>
    </main>
</body>
</html>
