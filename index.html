<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Agency - Budget Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Space Agency Mission Control</h1>
        
        <div class="budget-section">
            <h2>Budget Status</h2>
            <div class="budget-display">
                <span class="budget-label">Available Budget:</span>
                <span class="budget-amount" id="budgetDisplay">$1,000,000</span>
            </div>
        </div>

        <div class="missions-section">
            <h2>Available Missions</h2>
            <div class="missions-list" id="missionsList">
                <!-- Missions will be rendered here -->
            </div>
        </div>

        <button id="resetBudgetBtn" class="reset-btn">Reset Budget</button>
    </div>

    <script src="budget.js"></script>
</body>
</html>
