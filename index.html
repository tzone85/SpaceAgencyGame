<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Command Academy</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #fafafa;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .budget-counter {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .mission-list-container {
            margin-top: 30px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
        }

        .mission-list-container h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
            margin-top: 0;
        }

        .mission-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mission-list.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            color: #999;
            font-size: 1.1rem;
        }

        .mission-item {
            padding: 15px;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease;
        }

        .mission-item:hover {
            background: #f0f0f0;
        }

        .mission-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 20px;
        }

        .mission-info {
            flex: 1;
        }

        .mission-info h3 {
            margin: 0 0 5px 0;
            color: #333;
            font-size: 1.1rem;
        }

        .mission-info p {
            margin: 0 0 8px 0;
            color: #666;
            font-size: 0.95rem;
        }

        .mission-cost {
            display: inline-block;
            font-weight: bold;
            color: #4CAF50;
            font-size: 0.95rem;
        }

        .mission-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            min-width: 180px;
        }

        .launch-btn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .launch-btn:hover:not(:disabled) {
            background-color: #45a049;
        }

        .launch-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .mission-warning {
            color: #dc3545;
            font-size: 0.85rem;
            margin: 0;
            text-align: right;
            max-width: 180px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 4px;
            font-size: 0.95rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .notification-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .notification-warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
    </style>
</head>
<body>
    <main id="dashboard-container" class="dashboard">
        <!-- Main dashboard content will go here -->
        <div data-budget-counter class="budget-counter">
            Budget: $1,000,000
        </div>

        <section class="mission-list-container">
            <h2>Available Missions</h2>
            <ul class="mission-list empty" id="missionList">
                <li>No missions available yet. Check back soon!</li>
            </ul>
        </section>
    </main>

    <script src="mission-manager.js"></script>
    <script src="ui-controller.js"></script>
    <script>
        // Initialize the mission management system when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            // Create mission manager with initial budget
            const manager = new MissionManager(1000000);

            // Add sample missions
            manager.addMission({
                id: 'alpha',
                name: 'Explore Alpha Centauri',
                cost: 150000,
                description: 'Survey the nearest star system for habitable planets.'
            });

            manager.addMission({
                id: 'beta',
                name: 'Research Beta Station',
                cost: 250000,
                description: 'Conduct deep space research at Beta Station.'
            });

            manager.addMission({
                id: 'gamma',
                name: 'Rescue Gamma Team',
                cost: 500000,
                description: 'Emergency rescue mission for the stranded Gamma team.'
            });

            manager.addMission({
                id: 'delta',
                name: 'Map Delta Nebula',
                cost: 75000,
                description: 'Create detailed maps of the Delta Nebula region.'
            });

            manager.addMission({
                id: 'epsilon',
                name: 'Supply Epsilon Base',
                cost: 100000,
                description: 'Deliver supplies to remote Epsilon Base.'
            });

            // Create UI controller
            const controller = new UIController(manager);

            // Get DOM elements
            const budgetDisplay = document.querySelector('[data-budget-counter]');
            const missionList = document.getElementById('missionList');

            // Initialize UI
            controller.init(budgetDisplay, missionList);
            controller.renderMissions();
        });
    </script>
</body>
</html>
