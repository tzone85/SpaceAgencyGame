<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Command Academy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .budget-counter {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
            margin-bottom: 20px;
        }

        .mission-list-container {
            margin-top: 30px;
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
        }

        .mission-list-container h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        .mission-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mission-list.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            color: #666;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <main id="dashboard-container" class="dashboard">
        <!-- Main dashboard content will go here -->
        <div data-budget-counter class="budget-counter">
            Budget: $1,000,000
        </div>

        <section class="mission-list-container">
            <h2>Available Missions</h2>
            <ul class="mission-list empty" id="missionList">
                <li>No missions available yet. Check back soon!</li>
            </ul>
        </section>
    </main>
</body>
</html>
