<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Command Academy</title>
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
    <main id="dashboard-container" class="dashboard">
        <!-- Main dashboard content will go here -->
        <div data-budget-counter class="budget-counter">
            Budget: $1,000,000
        </div>

        <section class="mission-list-container">
            <h2>Available Missions</h2>
            <ul class="mission-list empty" id="missionList">
                <li>No missions available yet. Check back soon!</li>
            </ul>
        </section>
    </main>

    <script src="mission-manager.js"></script>
    <script src="ui-controller.js"></script>
    <script>
        // Initialize the mission management system when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            // Create mission manager with initial budget
            const manager = new MissionManager(1000000);

            // Add sample missions
            manager.addMission({
                id: 'alpha',
                name: 'Explore Alpha Centauri',
                cost: 150000,
                description: 'Survey the nearest star system for habitable planets.'
            });

            manager.addMission({
                id: 'beta',
                name: 'Research Beta Station',
                cost: 250000,
                description: 'Conduct deep space research at Beta Station.'
            });

            manager.addMission({
                id: 'gamma',
                name: 'Rescue Gamma Team',
                cost: 500000,
                description: 'Emergency rescue mission for the stranded Gamma team.'
            });

            manager.addMission({
                id: 'delta',
                name: 'Map Delta Nebula',
                cost: 75000,
                description: 'Create detailed maps of the Delta Nebula region.'
            });

            manager.addMission({
                id: 'epsilon',
                name: 'Supply Epsilon Base',
                cost: 100000,
                description: 'Deliver supplies to remote Epsilon Base.'
            });

            // Create UI controller
            const controller = new UIController(manager);

            // Get DOM elements
            const budgetDisplay = document.querySelector('[data-budget-counter]');
            const missionList = document.getElementById('missionList');

            // Initialize UI
            controller.init(budgetDisplay, missionList);
            controller.renderMissions();
        });
    </script>
</body>
</html>
