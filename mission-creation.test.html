<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mission Entry Creation Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .test-case { padding: 10px; margin: 10px 0; border-left: 4px solid #ddd; }
        .test-case.pass { background: #d4edda; border-left-color: #28a745; }
        .test-case.fail { background: #f8d7da; border-left-color: #dc3545; }
        .summary { padding: 15px; margin-top: 20px; background: #e7f3ff; border: 2px solid #0066cc; border-radius: 4px; }
        .summary.all-pass { background: #d4edda; border-color: #28a745; }
    </style>
</head>
<body>
    <h1>Mission Entry Creation - Test Results</h1>
    <div id="testResults"></div>

    <script>
        const tests = [];

        function test(description, fn) {
            tests.push({ description, fn });
        }

        function renderResults() {
            const results = document.getElementById('testResults');
            let passCount = 0;
            let failCount = 0;

            tests.forEach(({ description, fn }) => {
                const div = document.createElement('div');
                try {
                    fn();
                    div.className = 'test-case pass';
                    div.textContent = '✓ ' + description;
                    passCount++;
                } catch (error) {
                    div.className = 'test-case fail';
                    div.textContent = '✗ ' + description + ' - ' + error.message;
                    failCount++;
                }
                results.appendChild(div);
            });

            const summary = document.createElement('div');
            summary.className = 'summary' + (failCount === 0 ? ' all-pass' : '');
            summary.textContent = 'Test Summary: ' + passCount + ' passed, ' + failCount + ' failed out of ' + tests.length + ' tests';
            results.appendChild(summary);
        }

        async function loadAndTest() {
            try {
                const response = await fetch('index.html');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Tests for HTML structure
                test('Launch Mission button exists in HTML', () => {
                    const btn = doc.getElementById('launchMissionBtn');
                    if (!btn) throw new Error('Button with id "launchMissionBtn" not found');
                });

                test('Launch Mission button has correct class for styling', () => {
                    const btn = doc.getElementById('launchMissionBtn');
                    if (!btn || !btn.classList.contains('launch-mission-btn')) {
                        throw new Error('Button should have class "launch-mission-btn"');
                    }
                });

                test('Mission list container has ID for JavaScript access', () => {
                    const list = doc.getElementById('missionList');
                    if (!list) throw new Error('Mission list with id "missionList" not found');
                });

                test('Styling includes mission-entry class', () => {
                    if (!html.includes('.mission-entry')) {
                        throw new Error('CSS should define .mission-entry class for visual distinction');
                    }
                });

                test('Styling includes mission-entry-content class', () => {
                    if (!html.includes('.mission-entry-content')) {
                        throw new Error('CSS should define .mission-entry-content class');
                    }
                });

                test('Styling includes mission-entry-planet class', () => {
                    if (!html.includes('.mission-entry-planet')) {
                        throw new Error('CSS should define .mission-entry-planet class');
                    }
                });

                test('Styling includes mission-entry-cost class', () => {
                    if (!html.includes('.mission-entry-cost')) {
                        throw new Error('CSS should define .mission-entry-cost class');
                    }
                });

                test('Mission entries have visual distinction (gradient background)', () => {
                    if (!html.includes('linear-gradient') || !html.includes('.mission-entry')) {
                        throw new Error('Mission entries should have distinctive styling');
                    }
                });

                test('JavaScript contains createMissionEntry function', () => {
                    if (!html.includes('function createMissionEntry')) {
                        throw new Error('Function "createMissionEntry" should be defined');
                    }
                });

                test('JavaScript contains addMission function', () => {
                    if (!html.includes('function addMission')) {
                        throw new Error('Function "addMission" should be defined');
                    }
                });

                test('JavaScript contains mission data', () => {
                    if (!html.includes('const missions') || !html.includes('planet') || !html.includes('cost')) {
                        throw new Error('JavaScript should define missions array with planet and cost properties');
                    }
                });

                test('Button click handler is registered on DOMContentLoaded', () => {
                    if (!html.includes('launchMissionBtn') || !html.includes('addEventListener')) {
                        throw new Error('Should register click event listener for launch button');
                    }
                });

                test('Mission entries contain planet name element', () => {
                    if (!html.includes('mission-entry-planet')) {
                        throw new Error('Mission entries should display planet name');
                    }
                });

                test('Mission entries contain cost element', () => {
                    if (!html.includes('mission-entry-cost') || !html.includes('Cost:')) {
                        throw new Error('Mission entries should display cost');
                    }
                });

                test('Empty message removal logic is implemented', () => {
                    if (!html.includes('.classList.contains(\'empty\')')) {
                        throw new Error('Function should check for and remove empty class');
                    }
                });

                test('Multiple missions can be added (cycling logic exists)', () => {
                    if (!html.includes('missionIndex') || !html.includes('%')) {
                        throw new Error('Should support cycling through missions for multiple adds');
                    }
                });

                renderResults();
            } catch (error) {
                const div = document.createElement('div');
                div.className = 'test-case fail';
                div.textContent = '✗ Error loading tests: ' + error.message;
                document.getElementById('testResults').appendChild(div);
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndTest);
    </script>
</body>
</html>
